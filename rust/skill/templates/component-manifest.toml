# --- Security-Relevant Fields ---
# These fields are reviewed during QA submission. Declare all access your component requires.

# vault_keys: Vault key names your component will request via CredentialManager.
# Only keys listed here can be resolved; others return AccessDenied.
# vault_keys = ["SKILL_API_KEY"]

# env_vars: Environment variables your component reads at runtime.
# Undeclared env var access is flagged as a sandbox violation.
# env_vars = ["HOME", "PATH"]

# filesystem_paths: Filesystem paths your component accesses.
# Access outside these paths is flagged as a sandbox violation.
# filesystem_paths = ["/tmp"]

# network_endpoints: External network endpoints your component connects to.
# network_endpoints = ["https://api.example.com"]

# max_output_bytes: Maximum output size in bytes (for sandbox enforcement).
# max_output_bytes = 1048576

